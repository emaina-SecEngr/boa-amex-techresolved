<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Upcoming LBB event reminder</title>
</head>
<body style="font-family: Arial, sans-serif; line-height: 1.5; color: #333;">
  <h2>{{ project_name }}</h2>
  <p>Hello {{ volunteer_name }},</p>
  <p>
    This is a friendly reminder that you have an LBB volunteer commitment in about
    <strong>{{ reminder_label }}</strong>.
  </p>
  <p>Event date: <strong>{{ event_date }}</strong> at <strong>{{ event_time }}</strong></p>
  <p>— {{ project_name }}</p>
</body>
</html>
