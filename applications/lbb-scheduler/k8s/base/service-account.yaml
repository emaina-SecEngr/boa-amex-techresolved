# ============================================================
# LBBS Kubernetes — Service Account (IAM for Pods)
# ============================================================
# A ServiceAccount is like an IAM user for pods.
# It connects to AWS IAM via IRSA (IAM Roles for Service Accounts).
#
# HOW IT WORKS:
#   ServiceAccount in Kubernetes → mapped to IAM Role in AWS
#   Pod uses ServiceAccount → gets temporary AWS credentials
#   No access keys stored anywhere!
#
# This is the Kubernetes equivalent of ECS task roles.
# ============================================================

apiVersion: v1
kind: ServiceAccount
metadata:
  name: lbbs-backend-sa
  namespace: lbbs-DISTRICT_NAME
  labels:
    app: lbbs-backend
    district: DISTRICT_NAME
  annotations:
    # IRSA: Map this ServiceAccount to an AWS IAM Role
    # The pod automatically gets temporary AWS credentials
    eks.amazonaws.com/role-arn: "arn:aws:iam::ACCOUNT_ID:role/lbbs-backend-role"
