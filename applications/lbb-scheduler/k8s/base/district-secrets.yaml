# ============================================================
# LBBS Kubernetes — District Secrets Template
# ============================================================
# Each district has its OWN database credentials and secrets.
# District A cannot read District B's secrets.
#
# IN PRODUCTION:
#   Don't put real secrets in YAML files!
#   Use External Secrets Operator to pull from AWS Secrets Manager.
#   This template shows the STRUCTURE only.
#
# REAL FLOW:
#   AWS Secrets Manager (stores real values)
#     → External Secrets Operator (reads from AWS)
#       → Kubernetes Secret (injected into pod)
#         → Pod environment variable (app uses it)
# ============================================================

apiVersion: v1
kind: Secret
metadata:
  name: lbbs-district-secrets
  namespace: lbbs-DISTRICT_NAME
  labels:
    app: lbbs
    district: DISTRICT_NAME
type: Opaque
stringData:
  # Database connection (district-specific schema)
  DATABASE_URL: "postgresql://lbbs_admin:CHANGE_ME@rds-endpoint:5432/lbbs_DISTRICT_NAME"
  # JWT secret (shared across the app or district-specific)
  SECRET_KEY: "CHANGE_ME_UNIQUE_PER_DISTRICT"
  # District identifier
  DISTRICT_ID:

