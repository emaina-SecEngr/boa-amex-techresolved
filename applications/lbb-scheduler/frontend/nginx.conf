# ==============================================================
# LBBS Nginx Configuration
# ==============================================================
# 1. Serves React static files (HTML/JS/CSS)
# 2. Proxies /api/* requests to the backend container
# 3. Handles React Router (all routes → index.html)
# ==============================================================

server {
    listen 80;
    server_name localhost;

    # Serve React build files
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to the backend container
    # Frontend calls /api/v1/... → Nginx forwards to backend:8000/api/v1/...
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (for future real-time features)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Proxy SCIM endpoints
    location /scim/ {
        proxy_pass http://backend:8000/scim/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy SSO endpoints
    location /sso/ {
        proxy_pass http://backend:8000/sso/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # React Router — all non-file routes serve index.html
    # This lets /admin/reports, /volunteer/events, etc. work
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets (JS/CSS/images)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
