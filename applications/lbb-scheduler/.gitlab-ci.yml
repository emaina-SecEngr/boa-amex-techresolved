# ============================================================
# LBBS GitLab CI/CD — Complete DevSecOps Pipeline
# ============================================================
# SFWE 402 — DevSecOps Learning Pipeline
# Author: Eliud Maina
# University of Arizona — College of Engineering
#
# PIPELINE OVERVIEW:
#   Stage 1: lint      — Code quality checks (2 jobs)
#   Stage 2: test      — Unit tests (1 job)
#   Stage 3: security  — Complete security suite (13 jobs)
#   Stage 4: build     — Build verification (2 jobs)
#   Stage 5: deploy    — AWS deployment (COMMENTED — enable when AWS ready)
#
# SECURITY TESTING COVERAGE:
#   SAST:      Bandit (static code analysis)
#   SCA:       pip-audit, npm audit, Snyk, Safety (dependency scanning)
#   Secrets:   detect-secrets (credential scanning)
#   License:   pip-licenses (license compliance)
#   Quality:   SonarQube (code quality + security)
#   DAST:      OWASP ZAP (dynamic application security testing)
#   IaC:       Checkov (infrastructure as code scanning)
#   Container: Hadolint (Dockerfile linting)
#              Trivy (container vulnerability scanning)
#
# DEPLOYMENT (COMMENTED — FOR LEARNING):
#   Terraform: Infrastructure as Code (AWS provisioning)
#   Docker:    Build and push images to ECR
#   ECS:       Deploy containers to AWS Fargate
#   K8s:       Kubernetes deployment (alternative to ECS)
#   ArgoCD:    GitOps continuous delivery
# ============================================================

stages:
  - lint
  - test
  - security
  - build
  # - deploy          # ← UNCOMMENT when AWS is configured

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.pip-cache"
  # ── AWS Variables (uncomment when AWS is configured) ──
  # AWS_REGION: "us-west-2"
  # AWS_ACCOUNT_ID: "123456789012"
  # ECR_REGISTRY: "${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
  # ECR_BACKEND_REPO: "${ECR_REGISTRY}/lbbs-backend"
  # ECR_FRONTEND_REPO: "${ECR_REGISTRY}/lbbs-frontend"
  # ECS_CLUSTER: "lbbs-production"
  # ECS_BACKEND_SERVICE: "lbbs-backend-service"
  # ECS_FRONTEND_SERVICE: "lbbs-frontend-service"
  # KUBE_NAMESPACE: "lbbs-production"

cache:
  paths:
    - .pip-cache/
    - frontend/node_modules/

# =============================================================
# Stage 1: LINT — Code Quality
# =============================================================
backend-lint:
  stage: lint
  image: python:3.13-slim
  script:
    - cd backend
    - pip install flake8 --quiet
    - echo "=== Running Flake8 Linter ==="
    - flake8 . --max-line-length=120 --exclude=__pycache__,migrations
  allow_failure: false

frontend-lint:
  stage: lint
  image: node:20-alpine
  script:
    - cd frontend
    - npm ci --quiet
    - echo "=== Running ESLint ==="
    - npm run lint
  allow_failure: false

# =============================================================
# Stage 2: TEST — Unit Tests
# =============================================================
backend-test:
  stage: test
  image: python:3.13-slim
  variables:
    DATABASE_URL: "sqlite:///./test.db"
    SECRET_KEY: "test-secret-key-for-ci"
    APP_ENV: "testing"
  script:
    - cd backend
    - pip install -r requirements.txt --quiet
    - pip install pytest pytest-cov --quiet
    - echo "=== Running Backend Tests ==="
    - python -m pytest tests/ -v --tb=short --junitxml=test-results.xml
  artifacts:
    reports:
      junit: backend/test-results.xml
    paths:
      - backend/test-results.xml
    when: always

frontend-test:
  stage: test
  image: node:20-alpine
  script:
    - cd frontend
    - npm ci --quiet
    - echo "=== Running Frontend Tests (Vitest) ==="
    - npm run test

# =============================================================
# Stage 3: SECURITY — DevSecOps Scanning
# =============================================================

# --- 3a. SAST: Static Application Security Testing ---
sast-bandit:
  stage: security
  image: python:3.13-slim
  script:
    - pip install bandit --quiet
    - cd backend
    - echo "========================================="
    - echo "  SAST — Bandit Security Scan (Python)"
    - echo "========================================="
    - bandit -r . -x ./tests,./migrations -f json -o bandit-report.json || true
    - bandit -r . -x ./tests,./migrations -ll || true
  artifacts:
    paths:
      - backend/bandit-report.json
    when: always
  allow_failure: true

# --- 3b. SCA: Software Composition Analysis (Python) ---
sca-python:
  stage: security
  image: python:3.13-slim
  script:
    - cd backend
    - pip install -r requirements.txt --quiet
    - pip install pip-audit --quiet
    - echo "========================================="
    - echo "  SCA — Python Dependency Vulnerability Scan"
    - echo "========================================="
    - pip-audit --format=json --output=pip-audit-report.json || true
    - pip-audit --desc || true
  artifacts:
    paths:
      - backend/pip-audit-report.json
    when: always
  allow_failure: true

# --- 3c. SCA: Software Composition Analysis (Node.js) ---
sca-node:
  stage: security
  image: node:20-alpine
  script:
    - cd frontend
    - npm ci --quiet
    - echo "========================================="
    - echo "  SCA — Node.js Dependency Vulnerability Scan"
    - echo "========================================="
    - npm audit --json > npm-audit-report.json || true
    - npm audit || true
  artifacts:
    paths:
      - frontend/npm-audit-report.json
    when: always
  allow_failure: true

# --- 3d. Secret Detection ---
secret-detection:
  stage: security
  image: python:3.13-slim
  script:
    - pip install detect-secrets --quiet
    - echo "========================================="
    - echo "  SECRET DETECTION — Credential Scan"
    - echo "========================================="
    - detect-secrets scan --all-files --exclude-files '\.git/.*' --exclude-files 'node_modules/.*' --exclude-files 'package-lock\.json' > secrets-report.json || true
    - cat secrets-report.json
  artifacts:
    paths:
      - secrets-report.json
    when: always
  allow_failure: true

# --- 3e. License Compliance ---
license-check:
  stage: security
  image: python:3.13-slim
  script:
    - cd backend
    - pip install -r requirements.txt --quiet
    - pip install pip-licenses --quiet
    - echo "========================================="
    - echo "  LICENSE COMPLIANCE — Dependency Licenses"
    - echo "========================================="
    - pip-licenses --format=markdown --order=license
    - echo "--- Checking for Copyleft Licenses ---"
    - pip-licenses --format=csv | grep -i "GPL\|AGPL" && echo "WARNING Copyleft licenses detected!" || echo "OK No copyleft licenses found."
  allow_failure: true

# --- 3f. Safety Check ---
safety-check:
  stage: security
  image: python:3.13-slim
  script:
    - cd backend
    - pip install -r requirements.txt --quiet
    - pip install safety --quiet
    - echo "========================================="
    - echo "  SAFETY — Python Vulnerability Database"
    - echo "========================================="
    - safety check --output json > safety-report.json || true
    - safety check || true
  artifacts:
    paths:
      - backend/safety-report.json
    when: always
  allow_failure: true

# --- 3g. SonarQube — Code Quality & Security Analysis ---
# Requires CI/CD variables: SONAR_HOST_URL (e.g. https://sonarcloud.io) and SONAR_TOKEN
sonarqube-analysis:
  stage: security
  image: sonarsource/sonar-scanner-cli:latest
  rules:
    - if: $SONAR_HOST_URL && $SONAR_TOKEN
    - when: never
  variables:
    SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"
    GIT_DEPTH: "0"
  cache:
    key: "${CI_JOB_NAME}"
    paths:
      - .sonar/cache
  script:
    - echo "========================================="
    - echo "  SONARQUBE — Code Quality & Security"
    - echo "========================================="
    - sonar-scanner
      -Dsonar.projectKey=devsecops-lbbs-project_lbbs-project-sfwe-402_25ff994f-aacb-482e-b677-f4df8c33461b
      -Dsonar.projectName=LBBS-SFWE402
      -Dsonar.sources=backend/app
      -Dsonar.tests=backend/tests
      -Dsonar.python.version=3.13
      -Dsonar.host.url=${SONAR_HOST_URL}
      -Dsonar.token=${SONAR_TOKEN}
      -Dsonar.sourceEncoding=UTF-8
      -Dsonar.qualitygate.wait=true
  allow_failure: true

# --- 3h. Snyk — Python Vulnerability & License Scanning ---
# Requires CI/CD variable SNYK_TOKEN. Job is skipped if unset (avoids auth/artifact failures).
snyk-python:
  stage: security
  image: python:3.13-slim
  rules:
    - if: $SNYK_TOKEN
    - when: never
  script:
    - pip install -r backend/requirements.txt --quiet
    - apt-get update && apt-get install -y curl --quiet
    - curl -sL https://static.snyk.io/cli/latest/snyk-linux -o /usr/local/bin/snyk
    - chmod +x /usr/local/bin/snyk
    - echo "========================================="
    - echo "  SNYK — Python Vulnerability Scan"
    - echo "========================================="
    - cd backend
    - snyk auth "$SNYK_TOKEN" || true
    - snyk test --file=requirements.txt --json > snyk-python-report.json || echo '{"error":"snyk test failed"}' > snyk-python-report.json
    - snyk test --file=requirements.txt --severity-threshold=high || true
  artifacts:
    paths:
      - backend/snyk-python-report.json
    when: always
  allow_failure: true

# --- 3i. Snyk — Node.js Vulnerability & License Scanning ---
snyk-node:
  stage: security
  image: node:20-alpine
  rules:
    - if: $SNYK_TOKEN
    - when: never
  script:
    - cd frontend
    - npm ci --quiet
    - npm install -g snyk
    - echo "========================================="
    - echo "  SNYK — Node.js Vulnerability Scan"
    - echo "========================================="
    - snyk auth "$SNYK_TOKEN" || true
    - snyk test --json > snyk-node-report.json || echo '{"error":"snyk test failed"}' > snyk-node-report.json
    - snyk test --severity-threshold=high || true
  artifacts:
    paths:
      - frontend/snyk-node-report.json
    when: always
  allow_failure: true

# --- 3j. DAST: OWASP ZAP — Dynamic Application Security Testing ---
dast-zap:
  stage: security
  image: python:3.13-slim
  variables:
    DATABASE_URL: "sqlite:///./test.db"
    SECRET_KEY: "test-secret-key-for-dast"
    APP_ENV: "testing"
  script:
    - echo "========================================="
    - echo "  DAST — OWASP ZAP Baseline Scan"
    - echo "========================================="
    - cd backend
    - pip install -r requirements.txt --quiet
    - uvicorn main:app --host 0.0.0.0 --port 8000 &
    - sleep 5
    - apt-get update && apt-get install -y curl --quiet
    - curl -f http://localhost:8000/health && echo "App is running!" || exit 1
    - apt-get install -y default-jre wget --quiet
    - wget -q https://github.com/zaproxy/zaproxy/releases/download/v2.16.1/ZAP_2.16.1_Linux.tar.gz
    - tar -xzf ZAP_2.16.1_Linux.tar.gz
    - echo "--- Scanning API endpoints ---"
    - ./ZAP_2.16.1/zap.sh -cmd
      -quickurl http://localhost:8000
      -quickout /tmp/zap-report.html
      -quickprogress || true
    - cp /tmp/zap-report.html ../zap-report.html || true
    - curl -s http://localhost:8000/openapi.json > openapi.json
    - echo "--- ZAP Scan Complete ---"
  artifacts:
    paths:
      - zap-report.html
    when: always
  allow_failure: true

# --- 3k. IaC Security: Checkov — Infrastructure as Code Scanning ---
iac-checkov:
  stage: security
  image: python:3.13-slim
  script:
    - pip install checkov --quiet
    - echo "========================================="
    - echo "  IaC SECURITY — Checkov Scan"
    - echo "========================================="
    - echo "--- Scanning Dockerfiles ---"
    - checkov --file backend/Dockerfile --framework dockerfile --output json > checkov-backend-dockerfile.json || true
    - checkov --file backend/Dockerfile --framework dockerfile --compact || true
    - echo "--- Scanning Frontend Dockerfile ---"
    - checkov --file frontend/Dockerfile --framework dockerfile --output json > checkov-frontend-dockerfile.json || true
    - checkov --file frontend/Dockerfile --framework dockerfile --compact || true
    - echo "--- Scanning docker-compose.yml ---"
    - checkov --file docker-compose.yml --framework docker-compose --output json > checkov-compose.json || true
    - checkov --file docker-compose.yml --framework docker-compose --compact || true
    - echo "--- Checkov Scan Complete ---"
  artifacts:
    paths:
      - checkov-backend-dockerfile.json
      - checkov-frontend-dockerfile.json
      - checkov-compose.json
    when: always
  allow_failure: true

# --- 3l. Container Security: Hadolint — Dockerfile Best Practices ---
dockerfile-lint:
  stage: security
  image: hadolint/hadolint:latest-alpine
  script:
    - echo "========================================="
    - echo "  CONTAINER — Hadolint Dockerfile Lint"
    - echo "========================================="
    - echo "--- Backend Dockerfile ---"
    - hadolint backend/Dockerfile --format json > hadolint-backend.json || true
    - hadolint backend/Dockerfile || true
    - echo "--- Frontend Dockerfile ---"
    - hadolint frontend/Dockerfile --format json > hadolint-frontend.json || true
    - hadolint frontend/Dockerfile || true
    - echo "--- Hadolint Complete ---"
  artifacts:
    paths:
      - hadolint-backend.json
      - hadolint-frontend.json
    when: always
  allow_failure: true

# --- 3m. Container Security: Trivy — Image Vulnerability Scanning ---
trivy-scan:
  stage: security
  image: python:3.13-slim
  script:
    - apt-get update && apt-get install -y curl --quiet
    - curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
    - echo "========================================="
    - echo "  CONTAINER — Trivy Vulnerability Scan"
    - echo "========================================="
    - echo "--- Scanning Python base image ---"
    - trivy image --severity HIGH,CRITICAL --format json --output trivy-python.json python:3.13-slim || true
    - trivy image --severity HIGH,CRITICAL python:3.13-slim || true
    - echo "--- Scanning Node base image ---"
    - trivy image --severity HIGH,CRITICAL --format json --output trivy-node.json node:20-alpine || true
    - trivy image --severity HIGH,CRITICAL node:20-alpine || true
    - echo "--- Scanning project files ---"
    - trivy fs --security-checks vuln,secret,config --format json --output trivy-fs.json . || true
    - trivy fs --security-checks vuln,secret,config . || true
    - echo "--- Trivy Scan Complete ---"
  artifacts:
    paths:
      - trivy-python.json
      - trivy-node.json
      - trivy-fs.json
    when: always
  allow_failure: true

# =============================================================
# Stage 4: BUILD — Verify Applications Build
# =============================================================
backend-build:
  stage: build
  image: python:3.13-slim
  variables:
    DATABASE_URL: "sqlite:///./test.db"
    SECRET_KEY: "test-secret-key-for-ci"
    APP_ENV: "testing"
  script:
    - cd backend
    - pip install -r requirements.txt --quiet
    - echo "=== Verifying Backend Build ==="
    - python -c "from main import app; print('Backend builds successfully')"
  only:
    - main

frontend-build:
  stage: build
  image: node:20-alpine
  script:
    - cd frontend
    - npm ci --quiet
    - echo "=== Building Frontend ==="
    - npm run build
    - echo "Frontend builds successfully"
  only:
    - main

